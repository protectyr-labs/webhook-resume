<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="15%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="220"/>
    <line x1="200" y1="0" x2="200" y2="220"/>
    <line x1="300" y1="0" x2="300" y2="220"/>
    <line x1="400" y1="0" x2="400" y2="220"/>
    <line x1="500" y1="0" x2="500" y2="220"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="216" width="1200" height="4" fill="url(#accentLine)"/>

  <!-- LEFT SIDE: Title and description -->
  <text x="60" y="82" fill="#f8fafc" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5">webhook-resume</text>
  <text x="60" y="116" fill="#94a3b8" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" font-weight="400">Webhook-based pause/resume for async workflows</text>
  <text x="60" y="148" fill="#64748b" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" font-weight="400">Human-in-the-loop approval gates with timeout and multi-option routing</text>

  <!-- Tags -->
  <rect x="60" y="164" width="80" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="100" y="179" fill="#22d3ee" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">TypeScript</text>

  <rect x="150" y="164" width="95" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="197" y="179" fill="#22d3ee" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Zero Deps</text>

  <rect x="255" y="164" width="105" height="22" rx="4" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.25" stroke-width="1"/>
  <text x="307" y="179" fill="#22d3ee" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Storage Agnostic</text>

  <!-- RIGHT SIDE: Workflow diagram -->
  <!-- Workflow step boxes -->
  <g transform="translate(580, 30)">
    <!-- Automated workflow node -->
    <rect x="0" y="42" width="100" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="50" y="64" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Workflow</text>

    <!-- Arrow 1 -->
    <line x1="100" y1="60" x2="135" y2="60" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Approval Gate (highlighted) -->
    <rect x="135" y="34" width="120" height="52" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>
    <text x="195" y="56" fill="#22d3ee" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">APPROVAL GATE</text>
    <text x="195" y="72" fill="#64748b" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" text-anchor="middle">paused</text>

    <!-- Webhook arrow going down to human -->
    <line x1="195" y1="86" x2="195" y2="118" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="220" y="106" fill="#475569" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-style="italic">webhook</text>

    <!-- Human reviewer -->
    <rect x="150" y="118" width="90" height="36" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Person icon -->
    <circle cx="175" cy="131" r="5" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <line x1="175" y1="136" x2="175" y2="144" stroke="#94a3b8" stroke-width="1.2"/>
    <line x1="169" y1="140" x2="181" y2="140" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="200" y="140" fill="#cbd5e1" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Reviewer</text>

    <!-- Response arrow going back up and right -->
    <path d="M240,136 L280,136 L280,60 L310,60" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>

    <!-- Decision diamond (simplified as a rotated square) -->
    <g transform="translate(330, 60) rotate(45)">
      <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
    </g>
    <text x="330" y="64" fill="#22d3ee" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">?</text>

    <!-- Approve path (top) -->
    <line x1="346" y1="50" x2="400" y2="30" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
    <rect x="400" y="14" width="100" height="32" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
    <text x="450" y="34" fill="#22c55e" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Deploy</text>

    <!-- Reject path (bottom) -->
    <line x1="346" y1="70" x2="400" y2="100" stroke="#f87171" stroke-width="1.5" opacity="0.7"/>
    <rect x="400" y="84" width="100" height="32" rx="6" fill="#1e293b" stroke="#f87171" stroke-width="1.5" opacity="0.8"/>
    <text x="450" y="104" fill="#f87171" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Rollback</text>

    <!-- Labels on paths -->
    <text x="380" y="24" fill="#22c55e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" opacity="0.8" text-anchor="middle">approve</text>
    <text x="383" y="106" fill="#f87171" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" opacity="0.8" text-anchor="middle">reject</text>
  </g>

  <!-- Protectyr Labs watermark -->
  <text x="1140" y="210" fill="#334155" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" text-anchor="end">protectyr-labs</text>
</svg>